{% extends "base.html" %}

{% block title %}Log In — AskDB{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Log in to your AskDB workspace to continue querying databases</p>
    </div>
    
    <form class="auth-form" action="{{ url_for('login') }}" method="POST">
      <div class="form-group">
        <label for="username"><i data-lucide="user"></i> Username</label>
        <input type="text" id="username" name="username" placeholder="enter your username" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password"><i data-lucide="lock"></i> Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="btn-primary auth-submit-btn">
        <span>Log In to Account</span>
        <i data-lucide="arrow-right"></i>
      </button>
    </form>
    
    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('signup') }}">Create one here</a></p>
    </div>
  </div>
</div>
{% endblock %}
